<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#B5476B" />
<title>2026 속초여고 교육과정 박람회 — 반별 전체 일정표</title>
<link rel="stylesheet" href="style.css" />
<style>
  .sa-page{max-width:1100px;margin:0 auto;padding:18px 16px 60px;}
  .sa-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:6px;}
  .sa-title{font-size:20px;font-weight:800;color:#2b2310;letter-spacing:-.4px;}
  .sa-desc{font-size:12.5px;color:#8a7c55;margin:2px 0 18px;line-height:1.5;}
  .sa-actions{display:flex;gap:8px;}
  .sa-btn{padding:9px 14px;border:1px solid #e3dcca;background:#fff;border-radius:10px;
    font-size:13px;font-weight:800;color:#9C5E76;cursor:pointer;text-decoration:none;}
  .sa-btn.solid{background:#B5476B;border-color:#B5476B;color:#fff;}
  .sa-grade{font-size:16px;font-weight:800;color:#B5476B;margin:26px 2px 10px;
    padding-left:10px;border-left:4px solid #C97C97;}
  .mx-wrap{overflow:auto;max-height:46vh;border:1px solid #ece7da;border-radius:14px;
    box-shadow:0 6px 18px rgba(120,90,30,.05);background:#fff;
    -webkit-overflow-scrolling:touch;}
  .mx-table{border-collapse:collapse;table-layout:fixed;width:auto;min-width:100%;}
  .mx-table th,.mx-table td{border:1px solid #efe8d8;width:104px;height:60px;padding:6px;
    text-align:center;vertical-align:middle;font-size:12px;line-height:1.3;
    white-space:normal;word-break:keep-all;overflow:hidden;}
  .mx-table thead th{background:#B5476B;color:#fff;font-weight:700;position:sticky;top:0;}
  .mx-table thead th.mx-corner{background:#8C3F5C;}
  .mx-table tbody th{background:#f6f3ea;color:#6b5526;font-weight:800;
    position:sticky;left:0;z-index:1;}
  .mx-table tbody th .mx-when{display:block;font-size:10.5px;color:#8a7c55;font-weight:600;margin-top:2px;}
  .mx-table tbody td{color:#2b2310;font-weight:600;}
  .mx-table tbody td.empty{color:#cdbf9d;font-weight:500;background:#fcfbf7;}
  .mx-table tbody tr:nth-child(even) td{background:#fcfbf7;}
  .mx-table tbody tr:nth-child(even) td.empty{background:#f7f4ec;}
  @media print{
    .sa-actions{display:none;}
    .mx-wrap{overflow:visible;box-shadow:none;max-height:none;}
    .mx-table thead th,.mx-table tbody th{position:static;}
    .sa-grade{break-after:avoid;}
    .mx-wrap{break-inside:avoid;}
  }
</style>
</head>
<body>
<div class="sa-page">
  <div class="sa-head">
    <div class="sa-title">2026 속초여고 교육과정 박람회 · 반별 전체 일정표</div>
    <div class="sa-actions">
      <button class="sa-btn" onclick="window.print()">🖨️ 인쇄</button>
      <a class="sa-btn solid" href="index.html">← 앱으로</a>
    </div>
  </div>
  <div class="sa-desc">열 = 교실(반), 행 = 타임(A~N). 각 칸은 그 시간에 해당 교실에서 운영하는 부스(과목)입니다.</div>
  <div id="saBody"></div>
</div>

<script src="room_g1.js"></script>
<script src="room_g2.js"></script>
<script>
(function () {
  var SLOT_LETTERS = ["A","B","C","D","E","F","G","H","I","J","K","L","M","N"];
  var TIME_SLOTS = [
    "8:40~9:00","9:10~9:30","9:40~10:00","10:10~10:30",
    "10:40~11:00","11:10~11:30","11:40~12:00","12:10~12:30",
    "13:30~13:50","14:00~14:20","14:30~14:50","15:00~15:20",
    "15:30~15:50","16:00~16:20"
  ];
  function esc(s){return String(s).replace(/[&<>"']/g,function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}

  function roomsOf(ROOMS){
    var set={};
    for(var subj in ROOMS) for(var t in ROOMS[subj]) set[ROOMS[subj][t]]=1;
    return Object.keys(set).sort(function(a,b){return a.localeCompare(b,"ko",{numeric:true});});
  }

  function buildMatrix(title, ROOMS){
    ROOMS = ROOMS || {};
    var rooms = roomsOf(ROOMS);
    // cell[time][room] = 과목
    var cell = {};
    SLOT_LETTERS.forEach(function(L){ cell[L]={}; });
    for(var subj in ROOMS) for(var t in ROOMS[subj]) cell[t][ROOMS[subj][t]] = subj;

    var head = '<tr><th class="mx-corner">타임</th>'
      + rooms.map(function(r){return '<th>'+esc(r)+'</th>';}).join("") + '</tr>';
    var body = "";
    for(var i=0;i<SLOT_LETTERS.length;i++){
      var L=SLOT_LETTERS[i];
      body += '<tr><th>'+L+'<span class="mx-when">'+(TIME_SLOTS[i]||"")+'</span></th>'
        + rooms.map(function(r){
            var s=cell[L][r];
            return s ? '<td>'+esc(s)+'</td>' : '<td class="empty">·</td>';
          }).join("") + '</tr>';
    }
    return '<div class="sa-grade">'+esc(title)+'</div>'
      + '<div class="mx-wrap"><table class="mx-table"><thead>'+head+'</thead><tbody>'+body+'</tbody></table></div>';
  }

  document.getElementById("saBody").innerHTML =
      buildMatrix("1학년", window.ROOMS_G1)
    + buildMatrix("2학년", window.ROOMS_G2);
})();
</script>
</body>
</html>
